# Hive Model Configuration
# Defines available models and role-based defaults

[models]
# List of available models
available = ["gpt-4o-mini", "gpt-4-turbo", "gpt-4o"]

# Global default model
default_model = "gpt-4o-mini"

# Role-based model selection
# Maps agent kinds to specific models
role_orchestrator = "gpt-4o"
role_planner = "gpt-4-turbo"
role_coder = "gpt-4o-mini"
role_tester = "gpt-4-turbo"
role_verifier = "gpt-4o"
role_editor = "gpt-4o-mini"
